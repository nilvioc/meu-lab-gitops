apiVersion: apps/v1
kind: Deployment
metadata:
  name: meu-site-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec: # <-- Faltava este 'spec' (que define as configurações do Pod)
      imagePullSecrets:
      - name: aws-ecr-cred
      containers:
      - name: nginx
        image: 237422644543.dkr.ecr.us-east-1.amazonaws.com/meu-app-web:1bfea2abf2daf7018a6346eccb027913419e94a1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: meu-site-prod-svc
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
