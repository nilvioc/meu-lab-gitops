apiVersion: apps/v1
kind: Deployment
metadata:
  name: meu-site-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec: # <-- Faltava este 'spec' (que define as configurações do Pod)
      imagePullSecrets:
      - name: aws-ecr-cred
      containers:
      - name: nginx
        image: 237422644543.dkr.ecr.us-east-1.amazonaws.com/meu-app-web:1bba98d6ea60d22e08d5f5a61758dffc409e53b1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: meu-site-svc
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
